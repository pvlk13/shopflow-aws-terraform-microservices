services:
  postgres:
    image: postgres:16
    container_name: shopflow-postgres
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopflowuser
      POSTGRES_PASSWORD: shopflowpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build: ./services/user-service
    ports:
      - "8001:8001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopflow
      DB_USER: shopflowuser
      DB_PASSWORD: shopflowpass
    depends_on:
      - postgres

  product-service:
    build: ./services/product-service
    ports:
      - "8010:8002"

  order-service:
    build: ./services/order-service
    ports:
      - "8015:8003"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopflow
      DB_USER: shopflowuser
      DB_PASSWORD: shopflowpass
      USER_SERVICE_URL: http://user-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
    depends_on:
      - postgres
      - user-service
      - product-service

volumes:
  postgres_data: